<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alışveriş | Modanta Çanta</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
:root{--black:#090909;--gold:#d4af37;--softGold:#f4d778;--white:#fff}
html{scroll-behavior:smooth}
body{background:#fff;color:#111;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}

.header{
  position:fixed;top:0;left:0;width:100%;z-index:1000;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(212,175,55,.35);
  box-shadow:0 12px 35px rgba(0,0,0,.06);
}

.nav{
  max-width:1200px;margin:auto;padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}

.brand{display:flex;align-items:center;gap:9px;white-space:nowrap}
.brand img{width:50px;height:50px;border-radius:50%;object-fit:cover;border:1px solid var(--gold)}
.brand-title{font-size:22px;font-weight:900;letter-spacing:-.6px}
.brand-title span{color:var(--gold);font-size:18px}

.header-actions{display:flex;align-items:center;gap:8px}

.icon-btn{
  width:43px;height:43px;border-radius:50%;
  background:#090909;color:var(--softGold);
  border:1px solid var(--gold);
  display:none;align-items:center;justify-content:center;
  box-shadow:0 10px 24px rgba(0,0,0,.12);
}

.icon-btn svg{width:20px;height:20px;fill:currentColor}

.cart-btn{
  background:#090909;color:var(--softGold);
  border:1px solid var(--gold);
  padding:11px 15px;border-radius:999px;
  font-size:14px;font-weight:900;cursor:pointer;
  box-shadow:0 10px 24px rgba(0,0,0,.12);
}

.top-tabs{
  position:fixed;top:75px;left:0;width:100%;z-index:999;
  background:#fff;display:grid;grid-template-columns:repeat(3,1fr);
  border-bottom:1px solid rgba(212,175,55,.35);
}

.top-tabs a,.top-tabs select{
  width:100%;height:52px;background:#fff;color:#111;
  border:0;border-right:1px solid rgba(212,175,55,.35);
  font-size:15px;font-weight:900;
  display:flex;align-items:center;justify-content:center;text-align:center;
  cursor:pointer;outline:none;
}

.top-tabs a:last-child{border-right:0}
.top-tabs select{appearance:none;-webkit-appearance:none;text-align-last:center}

.main{flex:1;padding:155px 18px 50px}
.container{max-width:1200px;margin:auto}

.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:22px;
}

.product{
  background:#fff;
  border:1px solid rgba(212,175,55,.45);
  border-radius:30px;
  padding:13px;
  box-shadow:0 15px 38px rgba(0,0,0,.08);
  transition:.3s ease;
  animation:fadeUp .55s ease both;
}

.product:hover{
  transform:translateY(-7px);
  border-color:var(--softGold);
  box-shadow:0 0 32px rgba(212,175,55,.36),0 27px 60px rgba(0,0,0,.13);
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}

.product-img{
  position:relative;
  overflow:hidden;
  border-radius:24px;
  background:#f7f7f7;
}

.product-img::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.35),transparent);
  transform:translateX(-120%);
  transition:.7s ease;
}

.product:hover .product-img::after{
  transform:translateX(120%);
}

.product-img img{
  width:100%;
  height:310px;
  object-fit:cover;
  display:block;
  border-radius:24px;
}

.product-info{padding:17px 7px 7px}
.product-info h3{font-size:19px;margin-bottom:8px}
.product-info p{color:#666;font-size:14px;line-height:1.5;margin-bottom:15px}

.product-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.price{color:#b88a18;font-size:20px;font-weight:900}

.order-btn{
  background:#090909;
  color:var(--softGold);
  border:1px solid var(--gold);
  padding:10px 14px;
  border-radius:14px;
  font-size:13px;
  font-weight:900;
  cursor:pointer;
}

.empty-products{
  grid-column:1/-1;
  border:1px dashed rgba(212,175,55,.8);
  border-radius:24px;
  padding:35px;
  text-align:center;
  color:#777;
  font-weight:900;
  background:#fff;
}

.developer-footer{
  margin-top:auto;
  background:transparent;
  color:#111;
  padding:22px 18px;
  text-align:center;
  font-size:15px;
  font-weight:600;
}

.developer-footer strong{font-weight:900}

@media(max-width:920px){
  .products{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:600px){
  .nav{padding:10px 12px}
  .brand img{width:42px;height:42px}
  .brand-title{font-size:18px}
  .brand-title span{font-size:15px}
  .header-actions{gap:6px}
  .icon-btn{width:38px;height:38px}
  .cart-btn{padding:9px 10px;font-size:12px}
  .top-tabs{top:63px}
  .top-tabs a,.top-tabs select{height:48px;font-size:13px}
  .main{padding:132px 12px 38px}
  .products{grid-template-columns:1fr 1fr;gap:13px}
  .product{border-radius:22px;padding:8px}
  .product-img{border-radius:18px}
  .product-img img{height:165px;border-radius:18px}
  .product-info{padding:11px 4px 4px}
  .product-info h3{font-size:14px}
  .product-info p{font-size:12px}
  .price{font-size:15px}
  .order-btn{font-size:11px;padding:8px 9px}
  .developer-footer{font-size:13px;padding:18px 12px}
}
</style>
</head>

<body>

<header class="header">
  <nav class="nav">
    <a href="https://modantacanta.com/" class="brand">
      <img src="https://pbs.twimg.com/media/HHaRfeXWIAExq29?format=jpg&name=240x240" alt="Modanta Çanta Logo">
      <div class="brand-title">Modanta <span>Çanta</span></div>
    </a>

    <div class="header-actions">
      <a id="wpIcon" class="icon-btn" target="_blank" aria-label="WhatsApp">
        <svg viewBox="0 0 32 32"><path d="M16.01 3C8.83 3 3.99 8.03 3.99 14.94c0 2.37.7 4.57 1.92 6.43L4 29l7.86-1.86a12.6 12.6 0 0 0 4.15.7C23.18 27.84 29 22.8 29 15.9S23.18 3 16.01 3zm0 22.6c-1.34 0-2.65-.33-3.82-.96l-.55-.3-4.66 1.1 1.13-4.43-.36-.58a10.02 10.02 0 0 1-1.54-5.48c0-5.54 4.12-9.72 9.8-9.72 5.67 0 10.77 4.18 10.77 10.67 0 5.54-5.1 9.7-10.77 9.7zm5.67-7.26c-.31-.16-1.83-.9-2.11-1-.28-.11-.49-.16-.7.16-.2.31-.8 1-.98 1.2-.18.21-.36.23-.67.08-.31-.16-1.3-.48-2.48-1.53-.92-.82-1.54-1.83-1.72-2.14-.18-.31-.02-.48.14-.64.14-.14.31-.36.46-.54.15-.18.2-.31.31-.52.1-.2.05-.39-.03-.54-.08-.16-.7-1.68-.96-2.3-.25-.6-.5-.52-.7-.53h-.6c-.2 0-.54.08-.82.39-.28.31-1.08 1.05-1.08 2.57 0 1.52 1.1 2.98 1.26 3.19.16.2 2.18 3.32 5.28 4.65.74.32 1.31.51 1.76.65.74.23 1.42.2 1.95.12.6-.09 1.83-.75 2.09-1.47.26-.72.26-1.34.18-1.47-.08-.13-.28-.2-.59-.36z"/></svg>
      </a>

      <a id="igIcon" class="icon-btn" target="_blank" aria-label="Instagram">
        <svg viewBox="0 0 24 24"><path d="M7.8 2h8.4A5.8 5.8 0 0 1 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8A5.8 5.8 0 0 1 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2zm-.2 2A3.6 3.6 0 0 0 4 7.6v8.8A3.6 3.6 0 0 0 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6A3.6 3.6 0 0 0 16.4 4H7.6zm9.65 1.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>
      </a>

      <a href="sepet.html" class="cart-btn">Sepet <span id="cartCount">0</span></a>
    </div>
  </nav>
</header>

<div class="top-tabs">
  <select id="categorySelect" onchange="changeCategory()">
    <option value="all">Kategori: Tümü</option>
    <option value="canta">Çanta</option>
    <option value="gozluk">Gözlük</option>
    <option value="saat">Saat</option>
  </select>

  <a href="iletisim.html">İletişim</a>
  <a href="hakkimizda.html">Hakkımızda</a>
</div>

<main class="main">
  <div class="container">
    <div class="products" id="productsGrid">
      <div class="empty-products">Ürünler yükleniyor...</div>
    </div>
  </div>
</main>

<footer class="developer-footer">
  <strong>Kaan Ayaz Web Developer</strong> tarafından hazırlanmıştır
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  query,
  orderBy,
  onSnapshot,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAnXahaeXWh0JK1a8jNerRAfkN0OEXXkFc",
  authDomain: "modanta-canta.firebaseapp.com",
  projectId: "modanta-canta",
  storageBucket: "modanta-canta.firebasestorage.app",
  messagingSenderId: "138476521828",
  appId: "1:138476521828:web:ea7c3bfb510b2c90fc9271"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const productsGrid = document.getElementById("productsGrid");
const cartCount = document.getElementById("cartCount");
const wpIcon = document.getElementById("wpIcon");
const igIcon = document.getElementById("igIcon");

let allProducts = [];
let activeCategory = "all";
let cart = JSON.parse(localStorage.getItem("modantaCart") || "[]");

function saveCart(){
  localStorage.setItem("modantaCart", JSON.stringify(cart));
  cartCount.textContent = cart.length;
}

saveCart();

window.changeCategory = function(){
  activeCategory = document.getElementById("categorySelect").value;
  renderProducts();
};

function phoneClean(phone){
  return String(phone || "").replace(/\s/g,"").replace("+","");
}

function hasValue(value){
  return value && String(value).trim() !== "";
}

onSnapshot(doc(db, "sitePages", "contact"), (snap) => {
  if(!snap.exists()) return;

  const data = snap.data();

  if(hasValue(data.whatsapp)){
    wpIcon.href = "https://wa.me/" + phoneClean(data.whatsapp);
    wpIcon.style.display = "flex";
  }

  if(hasValue(data.instagram)){
    igIcon.href = data.instagram;
    igIcon.style.display = "flex";
  }
});

const q = query(
  collection(db, "products"),
  orderBy("createdAt", "desc")
);

onSnapshot(q, (snapshot) => {
  allProducts = [];

  snapshot.forEach(docSnap => {
    allProducts.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  renderProducts();
}, (error) => {
  productsGrid.innerHTML = `<div class="empty-products">Ürünler yüklenirken hata oluştu: ${error.message}</div>`;
});

function normalizeCategory(value){
  return String(value || "")
    .toLowerCase()
    .replaceAll("ı","i")
    .replaceAll("ğ","g")
    .replaceAll("ü","u")
    .replaceAll("ş","s")
    .replaceAll("ö","o")
    .replaceAll("ç","c")
    .trim();
}

function renderProducts(){
  let products = allProducts;

  if(activeCategory !== "all"){
    products = allProducts.filter(product => normalizeCategory(product.category) === activeCategory);
  }

  if(products.length === 0){
    productsGrid.innerHTML = `<div class="empty-products">Bu kategoride ürün bulunamadı.</div>`;
    return;
  }

  productsGrid.innerHTML = products.map(product => `
    <div class="product">
      <div class="product-img">
        <img src="${product.imageUrl || ""}" alt="${product.name || "Ürün"}">
      </div>

      <div class="product-info">
        <h3>${product.name || "Ürün adı"}</h3>
        <p>${product.description || ""}</p>

        <div class="product-row">
          <span class="price">₺${product.price || 0}</span>
          <button class="order-btn"
            data-id="${product.id}"
            data-code="${product.code || ""}"
            data-name="${product.name || ""}"
            data-price="${product.price || 0}"
            data-image="${product.imageUrl || ""}">
            Sepete Ekle
          </button>
        </div>
      </div>
    </div>
  `).join("");

  document.querySelectorAll(".order-btn").forEach(button => {
    button.addEventListener("click", () => {
      cart.push({
        id: button.dataset.id,
        code: button.dataset.code,
        name: button.dataset.name,
        price: Number(button.dataset.price),
        imageUrl: button.dataset.image
      });

      saveCart();
      button.textContent = "Eklendi";
      setTimeout(() => button.textContent = "Sepete Ekle", 900);
    });
  });
}
</script>

</body>
</html>
