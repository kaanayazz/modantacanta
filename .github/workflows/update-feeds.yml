name: Update Product Feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Repo indir
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Paketleri kur
        run: npm install

      - name: XML feedleri oluştur
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/generate-feeds.js

      - name: Değişiklikleri kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add merchant.xml facebook.xml
          git commit -m "Auto update product feeds" || echo "Değişiklik yok"
          git push
