<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hakkımızda | Modanta Çanta</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
:root{--gold:#d4af37}
body{background:#fff;color:#111;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}

.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#fff;
  border-bottom:1px solid rgba(212,175,55,.35);
  z-index:1000;
}

.nav{
  max-width:1200px;
  margin:auto;
  padding:12px 16px;
  display:flex;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:9px;
}

.brand img{
  width:50px;
  height:50px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid var(--gold);
}

.brand-title{
  font-size:22px;
  font-weight:900;
}

.brand-title span{
  color:var(--gold);
  font-size:18px;
}

.main{
  flex:1;
  padding:120px 18px 50px;
}

.container{
  max-width:1100px;
  margin:auto;
}

.page-head{
  margin-bottom:30px;
}

.page-head h1{
  font-size:38px;
  margin-bottom:10px;
}

.page-head p{
  color:#555;
  line-height:1.8;
  max-width:780px;
}

.about-list{
  display:grid;
  gap:24px;
}

.about-section{
  border:1px solid rgba(212,175,55,.35);
  border-radius:24px;
  padding:18px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
  align-items:center;
  background:#fff;
}

.about-section.left .about-image{
  order:1;
}

.about-section.left .about-content{
  order:2;
}

.about-section.right .about-content{
  order:1;
}

.about-section.right .about-image{
  order:2;
}

.about-image{
  min-height:320px;
  border:1px dashed rgba(212,175,55,.65);
  border-radius:20px;
  overflow:hidden;
  background:#fafafa;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#777;
  font-weight:900;
  text-align:center;
}

.about-image img{
  width:100%;
  height:100%;
  min-height:320px;
  object-fit:cover;
  display:block;
}

.about-content{
  padding:8px;
}

.about-content h2{
  font-size:28px;
  margin-bottom:12px;
}

.about-content p{
  color:#555;
  font-size:16px;
  line-height:1.8;
  white-space:pre-line;
}

.empty-box{
  border:1px dashed rgba(212,175,55,.7);
  border-radius:22px;
  padding:35px;
  text-align:center;
  color:#777;
  font-weight:900;
}

.developer-footer{
  margin-top:auto;
  color:#111;
  padding:22px 18px;
  text-align:center;
  font-size:15px;
  font-weight:600;
}

.developer-footer strong{
  font-weight:900;
}

@media(max-width:800px){
  .about-section{
    grid-template-columns:1fr;
  }

  .about-section.left .about-image,
  .about-section.right .about-image,
  .about-section.left .about-content,
  .about-section.right .about-content{
    order:initial;
  }

  .page-head h1{
    font-size:30px;
  }

  .about-content h2{
    font-size:24px;
  }

  .about-image,
  .about-image img{
    min-height:250px;
  }
}

@media(max-width:600px){
  .brand img{width:42px;height:42px}
  .brand-title{font-size:18px}
  .brand-title span{font-size:15px}
  .main{padding:100px 14px 38px}
  .developer-footer{font-size:13px}
}
</style>
</head>

<body>

<header class="header">
  <nav class="nav">
    <a href="https://modantacanta.com/" class="brand">
      <img src="https://pbs.twimg.com/media/HHaRfeXWIAExq29?format=jpg&name=240x240" alt="Modanta Çanta Logo">
      <div class="brand-title">Modanta <span>Çanta</span></div>
    </a>
  </nav>
</header>

<main class="main">
  <div class="container">

    <div class="page-head">
      <h1 id="aboutTitle">Hakkımızda</h1>
      <p id="aboutDesc">Modanta Çanta hakkında bilgiler panelden düzenlenebilir.</p>
    </div>

    <div class="about-list" id="aboutList">
      <div class="empty-box">Hakkımızda içerikleri panelden eklenecek.</div>
    </div>

  </div>
</main>

<footer class="developer-footer">
  <strong>Kaan Ayaz Web Developer</strong> tarafından hazırlanmıştır
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  doc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAnXahaeXWh0JK1a8jNerRAfkN0OEXXkFc",
  authDomain: "modanta-canta.firebaseapp.com",
  projectId: "modanta-canta",
  storageBucket: "modanta-canta.firebasestorage.app",
  messagingSenderId: "138476521828",
  appId: "1:138476521828:web:ea7c3bfb510b2c90fc9271"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const aboutTitle = document.getElementById("aboutTitle");
const aboutDesc = document.getElementById("aboutDesc");
const aboutList = document.getElementById("aboutList");

function hasValue(value){
  return value && String(value).trim() !== "";
}

function renderAbout(data){
  aboutTitle.textContent = data.aboutTitle || "Hakkımızda";
  aboutDesc.textContent = data.aboutDesc || "Modanta Çanta hakkında bilgiler panelden düzenlenebilir.";

  const sections = Array.isArray(data.sections) ? data.sections : [];

  if(sections.length === 0){
    aboutList.innerHTML = `<div class="empty-box">Hakkımızda içerikleri panelden eklenecek.</div>`;
    return;
  }

  aboutList.innerHTML = sections.map(section => {
    const title = section.title || "";
    const text = section.text || "";
    const imageUrl = section.imageUrl || "";
    const imagePosition = section.imagePosition === "left" ? "left" : "right";

    return `
      <section class="about-section ${imagePosition}">
        <div class="about-image">
          ${
            hasValue(imageUrl)
            ? `<img src="${imageUrl}" alt="${title || "Modanta Çanta Hakkımızda"}">`
            : `Görsel panelden eklenecek`
          }
        </div>

        <div class="about-content">
          <h2>${title || "Başlık panelden eklenecek"}</h2>
          <p>${text || "Açıklama panelden eklenecek."}</p>
        </div>
      </section>
    `;
  }).join("");
}

const aboutRef = doc(db, "sitePages", "about");

onSnapshot(aboutRef, (snap) => {
  if(!snap.exists()){
    aboutList.innerHTML = `<div class="empty-box">Hakkımızda içerikleri panelden eklenecek.</div>`;
    return;
  }

  renderAbout(snap.data());
});
</script>

</body>
</html>
