<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Modanta Çanta</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

:root{
  --black:#090909;
  --gold:#d4af37;
  --softGold:#f4d778;
  --white:#fff;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#fff;
  color:#111;
  overflow-x:hidden;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

a{
  color:inherit;
  text-decoration:none;
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(15px);
  border-bottom:1px solid rgba(212,175,55,.35);
}

.nav{
  max-width:1200px;
  margin:auto;
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.brand{
  display:flex;
  align-items:center;
  gap:9px;
  white-space:nowrap;
}

.brand img{
  width:50px;
  height:50px;
  border-radius:50%;
  object-fit:cover;
  border:1px solid var(--gold);
}

.brand-title{
  font-size:22px;
  font-weight:900;
  color:#111;
  letter-spacing:-.6px;
}

.brand-title span{
  color:var(--gold);
  font-size:18px;
}

.header-actions{
  display:flex;
  align-items:center;
  gap:8px;
}

.top-btn{
  background:#090909;
  color:var(--softGold);
  border:1px solid var(--gold);
  padding:11px 15px;
  border-radius:999px;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 10px 24px rgba(0,0,0,.12);
}

/* 3 KUTU */
.top-tabs{
  position:fixed;
  top:75px;
  left:0;
  width:100%;
  z-index:999;
  background:#fff;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  border-bottom:1px solid rgba(212,175,55,.35);
}

.top-tabs a,
.top-tabs select{
  width:100%;
  height:52px;
  background:#fff;
  color:#111;
  border:0;
  border-right:1px solid rgba(212,175,55,.35);
  font-size:15px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  cursor:pointer;
  outline:none;
}

.top-tabs a:last-child{
  border-right:0;
}

.top-tabs select{
  appearance:none;
  -webkit-appearance:none;
  text-align-last:center;
}

/* MAIN */
.main{
  flex:1;
  padding:155px 18px 50px;
}

.container{
  max-width:1200px;
  margin:auto;
}

.products{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:22px;
}

.product{
  background:#fff;
  border:1px solid rgba(212,175,55,.45);
  border-radius:30px;
  padding:13px;
  box-shadow:0 15px 38px rgba(0,0,0,.08);
  transition:.25s ease;
}

.product:hover{
  transform:translateY(-7px);
  border-color:var(--softGold);
  box-shadow:0 0 32px rgba(212,175,55,.36),0 27px 60px rgba(0,0,0,.13);
}

.product-img{
  position:relative;
  overflow:hidden;
  border-radius:24px;
  background:#f7f7f7;
}

.product-img img{
  width:100%;
  height:310px;
  object-fit:cover;
  display:block;
  border-radius:24px;
}

.product-info{
  padding:17px 7px 7px;
}

.product-info h3{
  font-size:19px;
  margin-bottom:8px;
}

.product-info p{
  color:#666;
  font-size:14px;
  line-height:1.5;
  margin-bottom:15px;
}

.product-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.price{
  color:#b88a18;
  font-size:20px;
  font-weight:900;
}

.order-btn{
  background:#090909;
  color:var(--softGold);
  border:1px solid var(--gold);
  padding:10px 14px;
  border-radius:14px;
  font-size:13px;
  font-weight:900;
  cursor:pointer;
}

.empty-products{
  grid-column:1/-1;
  border:1px dashed rgba(212,175,55,.8);
  border-radius:24px;
  padding:35px;
  text-align:center;
  color:#777;
  font-weight:900;
  background:#fff;
}

/* FOOTER */
.developer-footer{
  margin-top:auto;
  background:transparent;
  color:#111;
  padding:22px 18px;
  text-align:center;
  font-size:15px;
  font-weight:600;
}

.developer-footer strong{
  font-weight:900;
}

/* SEPET MODAL */
.cart-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(12px);
  z-index:3000;
  display:none;
  padding:16px;
}

.cart-modal.active{
  display:flex;
  align-items:center;
  justify-content:center;
}

.cart-box{
  width:min(720px,100%);
  max-height:calc(100vh - 32px);
  overflow:auto;
  background:#fff;
  border:1px solid var(--gold);
  border-radius:26px;
  box-shadow:0 30px 90px rgba(0,0,0,.35);
}

.cart-head{
  position:sticky;
  top:0;
  background:#fff;
  padding:18px;
  border-bottom:1px solid rgba(212,175,55,.35);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:2;
}

.cart-head h2{
  font-size:24px;
}

.cart-close{
  background:var(--gold);
  color:#111;
  border:0;
  border-radius:12px;
  padding:10px 14px;
  font-weight:900;
  cursor:pointer;
}

.cart-body{
  padding:18px;
}

.cart-item{
  display:grid;
  grid-template-columns:70px 1fr auto;
  gap:12px;
  align-items:center;
  border:1px solid rgba(212,175,55,.35);
  border-radius:18px;
  padding:10px;
  margin-bottom:10px;
}

.cart-item img{
  width:70px;
  height:70px;
  border-radius:12px;
  object-fit:cover;
}

.cart-item h3{
  font-size:16px;
  margin-bottom:5px;
}

.cart-item p{
  font-size:13px;
  color:#666;
}

.remove{
  background:#c91818;
  color:#fff;
  border:0;
  border-radius:10px;
  padding:8px 10px;
  font-weight:900;
  cursor:pointer;
}

.customer-form{
  margin-top:18px;
  display:grid;
  gap:10px;
}

.customer-form input,
.customer-form textarea{
  width:100%;
  border:1px solid rgba(0,0,0,.16);
  border-radius:14px;
  padding:13px;
  font-size:15px;
  outline:none;
}

.customer-form textarea{
  min-height:90px;
  resize:vertical;
}

.whatsapp-send{
  width:100%;
  background:#090909;
  color:var(--softGold);
  border:1px solid var(--gold);
  border-radius:16px;
  padding:15px;
  font-weight:900;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}

.cart-total{
  font-size:20px;
  font-weight:900;
  color:#b88a18;
  margin-top:12px;
}

/* MOBİL */
@media(max-width:920px){
  .products{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:600px){
  .nav{
    padding:10px 12px;
  }

  .brand img{
    width:42px;
    height:42px;
  }

  .brand-title{
    font-size:18px;
  }

  .brand-title span{
    font-size:15px;
  }

  .header-actions{
    gap:6px;
  }

  .top-btn{
    padding:9px 10px;
    font-size:12px;
  }

  .top-tabs{
    top:63px;
  }

  .top-tabs a,
  .top-tabs select{
    height:48px;
    font-size:13px;
  }

  .main{
    padding:132px 12px 38px;
  }

  .products{
    grid-template-columns:1fr 1fr;
    gap:13px;
  }

  .product{
    border-radius:22px;
    padding:8px;
  }

  .product-img{
    border-radius:18px;
  }

  .product-img img{
    height:165px;
    border-radius:18px;
  }

  .product-info{
    padding:11px 4px 4px;
  }

  .product-info h3{
    font-size:14px;
  }

  .product-info p{
    font-size:12px;
  }

  .price{
    font-size:15px;
  }

  .order-btn{
    font-size:11px;
    padding:8px 9px;
  }

  .cart-item{
    grid-template-columns:58px 1fr;
  }

  .cart-item img{
    width:58px;
    height:58px;
  }

  .remove{
    grid-column:1/-1;
  }

  .developer-footer{
    font-size:13px;
    padding:18px 12px;
  }
}
</style>
</head>

<body>

<header class="header">
  <nav class="nav">
    <a href="index.html" class="brand">
      <img src="https://pbs.twimg.com/media/HHaRfeXWIAExq29?format=jpg&name=240x240" alt="Modanta Çanta Logo">
      <div class="brand-title">Modanta <span>Çanta</span></div>
    </a>

    <div class="header-actions">
      <a href="https://wa.me/905435755840" target="_blank" class="top-btn">WhatsApp</a>
      <button class="top-btn" onclick="openCart()">Sepet <span id="cartCount">0</span></button>
    </div>
  </nav>
</header>

<div class="top-tabs">
  <select id="categorySelect" onchange="changeCategory()">
    <option value="all">Kategori: Tümü</option>
    <option value="canta">Çanta</option>
    <option value="gozluk">Gözlük</option>
    <option value="saat">Saat</option>
  </select>

  <a href="iletisim.html">İletişim</a>
  <a href="hakkimizda.html">Hakkımızda</a>
</div>

<main class="main">
  <div class="container">
    <div class="products" id="productsGrid">
      <div class="empty-products">Ürünler yükleniyor...</div>
    </div>
  </div>
</main>

<footer class="developer-footer">
  <strong>Kaan Ayaz Web Developer</strong> tarafından hazırlanmıştır
</footer>

<div class="cart-modal" id="cartModal">
  <div class="cart-box">
    <div class="cart-head">
      <h2>Sepet</h2>
      <button class="cart-close" onclick="closeCart()">Kapat</button>
    </div>

    <div class="cart-body">
      <div id="cartItems"></div>
      <div class="cart-total" id="cartTotal">Toplam: ₺0</div>

      <div class="customer-form">
        <input id="customerName" placeholder="Ad Soyad">
        <input id="customerPhone" placeholder="Telefon">
        <textarea id="customerNote" placeholder="Adres / Not"></textarea>
        <button class="whatsapp-send" onclick="sendOrder()">WhatsApp ile Sipariş Gönder</button>
      </div>
    </div>
  </div>
</div>

<script>
function openCart(){
  document.getElementById("cartModal").classList.add("active");
  document.body.style.overflow = "hidden";
  renderCart();
}

function closeCart(){
  document.getElementById("cartModal").classList.remove("active");
  document.body.style.overflow = "";
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  query,
  orderBy,
  onSnapshot,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAnXahaeXWh0JK1a8jNerRAfkN0OEXXkFc",
  authDomain: "modanta-canta.firebaseapp.com",
  projectId: "modanta-canta",
  storageBucket: "modanta-canta.firebasestorage.app",
  messagingSenderId: "138476521828",
  appId: "1:138476521828:web:ea7c3bfb510b2c90fc9271"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const whatsappNumber = "905435755840";
const productsGrid = document.getElementById("productsGrid");

let allProducts = [];
let activeCategory = "all";
let cart = JSON.parse(localStorage.getItem("modantaCart") || "[]");

function saveCart(){
  localStorage.setItem("modantaCart", JSON.stringify(cart));
  document.getElementById("cartCount").textContent = cart.length;
}

saveCart();

window.changeCategory = function(){
  activeCategory = document.getElementById("categorySelect").value;
  renderProducts();
};

const q = query(
  collection(db, "products"),
  orderBy("createdAt", "desc")
);

onSnapshot(q, (snapshot) => {
  allProducts = [];

  snapshot.forEach(docSnap => {
    allProducts.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  renderProducts();
}, (error) => {
  productsGrid.innerHTML = `<div class="empty-products">Ürünler yüklenirken hata oluştu: ${error.message}</div>`;
});

function normalizeCategory(value){
  return String(value || "")
    .toLowerCase()
    .replaceAll("ı","i")
    .replaceAll("ğ","g")
    .replaceAll("ü","u")
    .replaceAll("ş","s")
    .replaceAll("ö","o")
    .replaceAll("ç","c")
    .trim();
}

function renderProducts(){
  let products = allProducts;

  if(activeCategory !== "all"){
    products = allProducts.filter(product => {
      return normalizeCategory(product.category) === activeCategory;
    });
  }

  if(products.length === 0){
    productsGrid.innerHTML = `<div class="empty-products">Bu kategoride ürün bulunamadı.</div>`;
    return;
  }

  productsGrid.innerHTML = products.map(product => `
    <div class="product">
      <div class="product-img">
        <img src="${product.imageUrl || ""}" alt="${product.name || "Ürün"}">
      </div>

      <div class="product-info">
        <h3>${product.name || "Ürün adı"}</h3>
        <p>${product.description || ""}</p>

        <div class="product-row">
          <span class="price">₺${product.price || 0}</span>
          <button class="order-btn"
            data-id="${product.id}"
            data-code="${product.code || ""}"
            data-name="${product.name || ""}"
            data-price="${product.price || 0}"
            data-image="${product.imageUrl || ""}">
            Sepete Ekle
          </button>
        </div>
      </div>
    </div>
  `).join("");

  document.querySelectorAll(".order-btn").forEach(button => {
    button.addEventListener("click", () => {
      cart.push({
        id: button.dataset.id,
        code: button.dataset.code,
        name: button.dataset.name,
        price: Number(button.dataset.price),
        imageUrl: button.dataset.image
      });

      saveCart();
      alert("Ürün sepete eklendi.");
    });
  });
}

window.renderCart = function(){
  const cartItems = document.getElementById("cartItems");
  const cartTotal = document.getElementById("cartTotal");

  if(cart.length === 0){
    cartItems.innerHTML = `<div class="empty-products">Sepet boş.</div>`;
    cartTotal.textContent = "Toplam: ₺0";
    return;
  }

  cartItems.innerHTML = cart.map((item, index) => `
    <div class="cart-item">
      <img src="${item.imageUrl || ""}" alt="${item.name || "Ürün"}">
      <div>
        <h3>${item.name || "Ürün"}</h3>
        <p>Kod: ${item.code || "-"} • ₺${item.price || 0}</p>
      </div>
      <button class="remove" onclick="removeCartItem(${index})">Sil</button>
    </div>
  `).join("");

  const total = cart.reduce((sum, item) => sum + Number(item.price || 0), 0);
  cartTotal.textContent = "Toplam: ₺" + total;
};

window.removeCartItem = function(index){
  cart.splice(index, 1);
  saveCart();
  renderCart();
};

window.sendOrder = async function(){
  if(cart.length === 0){
    alert("Sepet boş.");
    return;
  }

  const name = document.getElementById("customerName").value.trim();
  const phone = document.getElementById("customerPhone").value.trim();
  const note = document.getElementById("customerNote").value.trim();

  const total = cart.reduce((sum, item) => sum + Number(item.price || 0), 0);

  const orderText = cart.map((item, i) =>
    `${i + 1}) ${item.name} | Kod: ${item.code || "-"} | ₺${item.price}`
  ).join("%0A");

  const message =
`Merhaba Modanta Çanta,%0A%0ASipariş vermek istiyorum.%0A%0A` +
`Ad Soyad: ${encodeURIComponent(name || "-")}%0A` +
`Telefon: ${encodeURIComponent(phone || "-")}%0A` +
`Not/Adres: ${encodeURIComponent(note || "-")}%0A%0A` +
`Ürünler:%0A${orderText}%0A%0AToplam: ₺${total}`;

  try{
    await addDoc(collection(db, "orders"), {
      name,
      phone,
      note,
      total,
      items: cart,
      createdAt: serverTimestamp()
    });
  }catch(error){
    console.log("Sipariş kaydı oluşturulamadı:", error.message);
  }

  window.open(`https://wa.me/${whatsappNumber}?text=${message}`, "_blank");
};
</script>

</body>
</html>
