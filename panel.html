<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modanta Çanta | Yönetim Paneli</title>
  <style>
    :root {
      --ink: #111111;
      --panel: #171717;
      --gold: #d4af37;
      --gold-soft: #f4d778;
      --bg: #f5f6f8;
      --surface: #ffffff;
      --line: #e7e7e7;
      --muted: #686868;
      --red: #d62828;
      --green: #178c4f;
      --blue: #1957d8;
      --cyan: #0693c9;
      --orange: #b97008;
      --radius: 18px;
      --shadow: 0 18px 45px rgba(0,0,0,.08);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }
    body {
      background: var(--bg);
      color: var(--ink);
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    button, input, select, textarea {
      font: inherit;
    }
    button {
      cursor: pointer;
    }
    input, select, textarea {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(0,0,0,.16);
      border-radius: 12px;
      padding: 12px 13px;
      background: #fff;
      color: #111;
      outline: none;
      font-size: 15px;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.45;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212,175,55,.18);
    }
    img {
      max-width: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    .toast {
      position: fixed;
      right: 18px;
      top: 18px;
      z-index: 10010;
      display: grid;
      gap: 10px;
      width: min(430px, calc(100vw - 36px));
    }
